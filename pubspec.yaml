name: footprints_sdk
description: Footprints AI mobile SDK for campaign delivery, ad rendering, and event tracking.
version: 0.1.1
homepage: https://github.com/Footprints-for-Retail/footprints-flutter-sdk

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  json_annotation: ^4.9.0
  connectivity_plus: ^6.0.0
  flutter_secure_storage: ^9.2.0
  device_info_plus: ^10.1.0
  sqflite: ^2.3.0
  path: ^1.9.0
  visibility_detector: ^0.4.0+2
  cached_network_image: ^3.3.0
  flutter_cache_manager: ^3.4.1
  video_player: ^2.8.0
  webview_flutter: ^4.7.0
  # >=13.0.0 spans both geolocator 13.x (Flutter 3.22+) and 14.x (Flutter
  # 3.29+). The LocationSettings API used in location_manager.dart is
  # identical across both majors, so one source compiles against either —
  # the resolver picks the highest version compatible with the host app's
  # Flutter SDK.
  geolocator: '>=13.0.0 <15.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  flutter_lints: ^3.0.0
  mockito: ^5.4.0
  build_verify: ^3.1.0
  http_mock_adapter: ^0.6.1
